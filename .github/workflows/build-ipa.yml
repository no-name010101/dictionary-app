name: Build 词典.ipa

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: 编译词典.ipa
    runs-on: macos-15
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 选择 Xcode 版本
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_26.1.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer 2>/dev/null || \
          { echo "ERROR: No Xcode 26.x found"; exit 1; }
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - name: 安装 xcodegen
        run: |
          brew install xcodegen

      - name: 生成 App 图标
        run: |
          # Generate a simple 1024x1024 PNG icon using Python stdlib + sips
          python3 << 'PYEOF'
          import struct, zlib
          
          # Create a simple 1024x1024 red image with white "词典" text placeholder
          # Use RGBA - red background
          width, height = 1024, 1024
          r, g, b, a = 220, 50, 50, 255  # Red background
          
          # Create raw pixel data
          raw_data = b''
          for y in range(height):
              row = b''
              for x in range(width):
                  row += struct.pack('BBBB', r, g, b, a)
              raw_data += row
          
          # Encode as PNG
          def create_png(width, height, raw_data):
              def chunk(chunk_type, data):
                  c = chunk_type + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              
              sig = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', width, height, 8, 6, 0, 0, 0))
              # Filter byte (0=None) per row + pixel data
              filtered = b''
              for y in range(height):
                  filtered += b'\x00'  # filter type
                  filtered += raw_data[y * width * 4:(y + 1) * width * 4]
              idat = chunk(b'IDAT', zlib.compress(filtered))
              iend = chunk(b'IEND', b'')
              return sig + ihdr + idat + iend
          
          png = create_png(width, height, raw_data)
          with open('DictionaryApp/Assets.xcassets/AppIcon.appiconset/AppIcon.png', 'wb') as f:
              f.write(png)
          print(f"Icon generated: {len(png)} bytes")
          PYEOF

      - name: 生成词库数据
        run: |
          cd DictionaryApp/Resources
          rm -f ecdict.db idiom.db xinhua.db
          
          python3 << 'PYEOF'
          import sqlite3
          conn = sqlite3.connect('ecdict.db')
          c = conn.cursor()
          c.execute('''CREATE TABLE IF NOT EXISTS stardict (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              word TEXT NOT NULL UNIQUE, sw TEXT NOT NULL,
              phonetic TEXT, definition TEXT, translation TEXT,
              pos TEXT, collins INTEGER, oxford INTEGER DEFAULT 0,
              tag TEXT, bnc INTEGER, frq INTEGER,
              exchange TEXT, detail TEXT, audio TEXT)''')
          c.execute('CREATE INDEX IF NOT EXISTS idx_word ON stardict(word)')
          c.execute('CREATE INDEX IF NOT EXISTS idx_sw ON stardict(sw)')
          words = [
              ('hello','hello','/helo/','used as a greeting','int. hello; hi','interjection',5,1,'cet4',None,1000,'p:helloed/d:helloed/i:helloing/3:hellos/s:hellos',None,None),
              ('world','world','/wrld/','the earth','n. world; earth','noun',5,1,'cet4',None,500,'p:worlds/s:worlds',None,None),
              ('dictionary','dictionary','/dkneri/','a reference book','n. dictionary','noun',3,1,'cet4',None,3000,'p:dictionaries/s:dictionaries',None,None),
              ('apple','apple','/pl/','a round fruit','n. apple','noun',5,1,'cet4',None,2000,'p:apples/s:apples',None,None),
              ('book','book','/bk/','a written work','n. book; books v. book','noun',5,1,'cet4',None,300,'p:booked/d:booked/i:booking/3:books/s:books',None,None),
              ('computer','computer','/kmpjutr/','an electronic machine','n. computer','noun',5,1,'cet4',None,1500,'p:computers/s:computers',None,None),
              ('language','language','/lngwd/','a system of communication','n. language','noun',5,1,'cet4',None,800,'p:languages/s:languages',None,None),
              ('knowledge','knowledge','/nld/','information gained by experience','n. knowledge','noun',5,1,'cet4',None,2000,None,None,None),
              ('learning','learning','/lrn/','the acquisition of knowledge','n. learning','noun',4,1,'cet4',None,3000,None,None,None),
              ('glass','glass','/gls/','a hard transparent material','n. glass; cup','noun',5,1,'cet4',None,2000,'p:glass/d:glass/i:glassing/3:glasses/s:glasses',None,None),
          ]
          for w in words:
              c.execute('INSERT OR IGNORE INTO stardict (word,sw,phonetic,definition,translation,pos,collins,oxford,tag,bnc,frq,exchange,detail,audio) VALUES (?,?,?,?,?,?,?,?,?,?,?,?,?,?)', w)
          conn.commit()
          conn.close()
          print('ECDICT: OK')
          PYEOF
          
          python3 << 'PYEOF'
          import sqlite3
          conn = sqlite3.connect('idiom.db')
          c = conn.cursor()
          c.execute('CREATE TABLE IF NOT EXISTS idiom (word TEXT PRIMARY KEY, pinyin TEXT, definition TEXT, origin TEXT, example TEXT)')
          idioms = [
              ('一心一意', 'yī xīn yī yì', '形容做事专心，一点也不马虎', '《三国志》', '他一心一意地钻研学问'),
              ('画龙点睛', 'huà lóng diǎn jīng', '比喻在关键处加上精辟的话', '唐·张彦远', '这句话起到了画龙点睛的作用'),
              ('守株待兔', 'shǒu zhū dài tù', '比喻不主动努力，而存侥幸心理', '《韩非子》', '不要守株待兔，要主动出击'),
          ]
          c.executemany('INSERT OR IGNORE INTO idiom VALUES (?,?,?,?,?)', idioms)
          conn.commit()
          conn.close()
          print('Idiom: OK')
          PYEOF
          
          python3 << 'PYEOF'
          import sqlite3
          conn = sqlite3.connect('xinhua.db')
          c = conn.cursor()
          c.execute('CREATE TABLE IF NOT EXISTS xinhua (character TEXT PRIMARY KEY, pinyin TEXT, radical TEXT, strokes INTEGER, definition TEXT, variants TEXT)')
          chars = [
              ('词', 'cí', '讠', 7, '语言里最小的可以独立运用的单位', ''),
              ('典', 'diǎn', '八', 8, '可以作为依据的书籍', ''),
              ('学', 'xué', '子', 8, '效法，获得知识', ''),
          ]
          c.executemany('INSERT OR IGNORE INTO xinhua VALUES (?,?,?,?,?,?)', chars)
          conn.commit()
          conn.close()
          print('Xinhua: OK')
          PYEOF
          
          echo "词库数据准备完成"
          ls -lh *.db

      - name: 用 xcodegen 生成项目
        run: |
          xcodegen generate
          echo "项目生成完成"
          ls -la DictionaryApp.xcodeproj/

      - name: 构建 Xcode Archive
        run: |
          mkdir -p build
          xcodebuild archive \
            -project DictionaryApp.xcodeproj \
            -scheme DictionaryApp \
            -configuration Release \
            -archivePath build/DictionaryApp.xcarchive \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee build/xcodebuild.log

      - name: 导出 词典.ipa
        run: |
          mkdir -p build
          APP_PATH="build/DictionaryApp.xcarchive/Products/Applications/DictionaryApp.app"
          
          if [ -d "$APP_PATH" ]; then
              echo "找到编译后的 .app"
              mkdir -p build/ipa/Payload
              cp -R "$APP_PATH" build/ipa/Payload/
              
              cat > build/ipa/iTunesMetadata.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>bundleIdentifier</key>
              <string>com.dictionary.liquidglass</string>
              <key>bundleShortVersionString</key>
              <string>1.0.0</string>
              <key>bundleVersion</key>
              <string>1</string>
              <key>itemName</key>
              <string>词典</string>
          </dict>
          </plist>
          PLIST
              
              cd build/ipa
              zip -r "$GITHUB_WORKSPACE/词典.ipa" Payload iTunesMetadata.plist
              cd "$GITHUB_WORKSPACE"
              echo "词典.ipa 打包完成"
              ls -lh "词典.ipa"
          else
              echo "未找到编译后的 .app，尝试直接导出..."
              cat > build/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>debugging</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF
              
              xcodebuild -exportArchive \
                -archivePath build/DictionaryApp.xcarchive \
                -exportOptionsPlist build/ExportOptions.plist \
                -exportPath build/export \
                CODE_SIGN_IDENTITY="-" \
                CODE_SIGNING_REQUIRED=NO \
                CODE_SIGNING_ALLOWED=NO
              
              find build/export -name "*.ipa" -exec cp {} "词典.ipa" \;
              
              if [ -f "词典.ipa" ]; then
                  echo "词典.ipa 导出完成"
                  ls -lh "词典.ipa"
              else
                  echo "IPA 导出失败"
                  exit 1
              fi
          fi

      - name: 上传 词典.ipa
        uses: actions/upload-artifact@v4
        with:
          name: 词典-ipa
          path: 词典.ipa
          retention-days: 30

      - name: 编译报告
        if: always()
        run: |
          echo "========================================="
          echo "  词典 App 编译报告"
          echo "========================================="
          if [ -f "词典.ipa" ]; then
              echo "编译成功!"
              echo "  IPA 大小: $(du -h 词典.ipa | cut -f1)"
              echo ""
              echo "安装方式:"
              echo "  1. TrollStore: 传输到 iPhone → 用 TrollStore 打开"
              echo "  2. AltStore:   通过 AltServer 侧载"
              echo "  3. Xcode:      直接安装到开发设备"
          else
              echo "编译失败，请查看上方日志"
          fi
          echo "========================================="
